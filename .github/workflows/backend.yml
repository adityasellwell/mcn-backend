name: Backend CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test || echo "No tests defined"

      # Optional: Deploy to VPS/Render
      - name: Deploy Backend
        run: |
          ssh SSH_USER@srv1556.hstgr.io "cd /home/USERNAME/public_html/api && git pull && npm install && pm2 restart backend"